<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Вакансии</title>

<style>
body{margin:0;font-family:Arial;background:#eef1f5;}
.container{max-width:500px;margin:auto;padding:20px;}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.fade{opacity:0;transform:translateY(30px);transition:0.8s;}
.fade.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<div class="container">

<div class="card fade">
<h2>📦 Работа на складе</h2>
<p>Простая работа, упаковка, сортировка</p>
</div>

<div class="card fade">
<h2>🏭 Работа на заводе</h2>
<p>Работа на линии, контроль процесса</p>
</div>

<div class="card fade">
<h2>🚚 Водитель</h2>
<p>Перевозка, высокая зарплата</p>
</div>

</div>

<script>
const o=new IntersectionObserver(e=>{e.forEach(i=>{if(i.isIntersecting)i.target.classList.add('show');});});
document.querySelectorAll('.fade').forEach(el=>o.observe(el));
</script>

</body>
</html>
