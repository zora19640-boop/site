<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>О нас</title>

<style>
body {margin:0;font-family:Arial;background:#eef1f5;}
.container {max-width:500px;margin:auto;padding:20px;}

.hero {
background: linear-gradient(135deg,#111827,#1f2937);
color:white;
padding:25px;
border-radius:20px;
}

.block {
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.fade {opacity:0;transform:translateY(30px);transition:0.8s;}
.fade.show {opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<div class="container">

<div class="hero fade">
<h1>О нашей компании</h1>
<p>Работаем с 2022 года</p>
</div>

<div class="block fade">
<p>👋 Кто мы и чем занимаемся</p>
<p>Мы помогли сотням людей найти стабильную работу с хорошим доходом.</p>
</div>

<div class="block fade">
<p>📌 Направления:</p>
<p>— склады</p>
<p>— заводы</p>
<p>— логистика</p>
</div>

<div class="block fade">
<p>💬 Наша задача — реально устроить вас на работу</p>
</div>

</div>

<script>
const observer = new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show');});
});
document.querySelectorAll('.fade').forEach(el=>observer.observe(el));
</script>

</body>
</html>
