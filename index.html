<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Работа</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef1f5;
}

/* HEADER */
.header {
    background: #111827;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
}

.menu-btn {
    font-size: 24px;
    cursor: pointer;
}

.menu {
    display: none;
    position: absolute;
    right: 20px;
    top: 60px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.menu a {
    display: block;
    padding: 12px 20px;
    text-decoration: none;
    color: black;
}

/* КОНТЕЙНЕР */
.container {
    padding: 20px;
    max-width: 500px;
    margin: auto;
}

/* АНИМАЦИЯ */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.8s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* HERO */
.hero {
    background: linear-gradient(135deg, #111827, #1f2937);
    color: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

/* ЦИФРЫ */
.salary {
    font-size: 32px;
    font-weight: bold;
    color: #22c55e;
    margin: 10px 0;
}

/* КАРТОЧКИ */
.card {
    padding: 10px;
    border-radius: 10px;
    margin: 5px 0;
    background: rgba(255,255,255,0.1);
}

/* КНОПКА */
.btn {
    display: block;
    background: #ef4444;
    color: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    font-weight: bold;
}

/* БЛОК */
.block {
    background: white;
    padding: 20px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* ФОРМА */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 15px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 10px;
}

/* POPUP */
.popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
}

.popup-content {
    background:white;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:400px;
}

.close {
    float:right;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>Работа</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="about.html">О нас</a>
<a href="jobs.html">Вакансии</a>
<a href="conditions.html">Условия</a>
</div>
</div>

<div class="container">

<div class="hero fade">
<h1>Работа с доходом</h1>

<div class="salary" id="salary">0 ₽</div>

<p>Склад / Завод • Без опыта</p>

<div class="card">💰 Доход 200–300к</div>
<div class="card">✅ Официально</div>
<div class="card">🤝 Контракт 3 мес – 3 года</div>

<a href="#form" class="btn">ПОДОБРАТЬ ВАКАНСИЮ</a>
</div>

<div class="block fade">
<h2>О работе</h2>
<p>Работа не сложная. Всему обучают на месте.</p>
<p>Подходит без опыта.</p>
</div>

<div class="block fade">
<h2 id="form">Оставить заявку</h2>

<input type="text" placeholder="Имя">
<input type="tel" placeholder="Телефон">

<select>
<option>Мессенджер</option>
<option>WhatsApp</option>
<option>Telegram</option>
<option>MAX</option>
</select>

<button onclick="sendForm()">Отправить</button>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<span class="close" onclick="closePopup()">✖</span>
<h3>Подберём вам работу</h3>

<input type="text" id="pname" placeholder="Имя">
<input type="tel" id="pphone" placeholder="Телефон">

<button onclick="sendPopup()">Отправить</button>
</div>
</div>

<script>
// МЕНЮ
function toggleMenu() {
let menu = document.getElementById('menu');
menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// TELEGRAM
function sendForm() {
let name = document.querySelector('input[type="text"]').value;
let phone = document.querySelector('input[type="tel"]').value;
sendToTG(name, phone);
}

function sendPopup() {
let name = document.getElementById('pname').value;
let phone = document.getElementById('pphone').value;
sendToTG(name, phone);
closePopup();
}

function sendToTG(name, phone) {
let token = "8724372615:AAEjCiuGB2gIHDqB0lPEiGJIt3ZxhEBNZc8";
let chat_id = "8183270307";

let text = "Новая заявка:%0AИмя: " + name + "%0AТелефон: " + phone;

let url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + text;

fetch(url)
.then(() => alert("Заявка отправлена"))
.catch(() => alert("Ошибка"));
}

// POPUP (15 СЕКУНД)
function closePopup() {
document.getElementById('popup').style.display = "none";
}

setTimeout(() => {
document.getElementById('popup').style.display = "flex";
}, 15000);

// АНИМАЦИЯ СКРОЛЛА
const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (entry.isIntersecting) {
entry.target.classList.add('show');
}
});
});

document.querySelectorAll('.fade').forEach(el => {
observer.observe(el);
});

// АНИМАЦИЯ ЦИФР
let started = false;

function animateSalary() {
if (started) return;
started = true;

let el = document.getElementById("salary");
let start = 200000;
let end = 300000;
let duration = 2000;
let stepTime = 20;
let increment = (end - start) / (duration / stepTime);

let counter = setInterval(() => {
start += increment;
if (start >= end) {
start = end;
clearInterval(counter);
}
el.innerText = Math.floor(start).toLocaleString() + " ₽";
}, stepTime);
}

const salaryObserver = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (entry.isIntersecting) {
animateSalary();
}
});
});

salaryObserver.observe(document.getElementById("salary"));
</script>

</body>
</html>
