<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Работа</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f3f5;
}

/* АНИМАЦИЯ */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* HEADER */
.header {
    background: #111;
    color: white;
    padding: 15px;
}

/* КОНТЕЙНЕР */
.container {
    padding: 20px;
}

/* HERO */
.hero {
    background: white;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
}

/* ЦИФРЫ */
.salary {
    font-size: 28px;
    font-weight: bold;
    color: #16a34a;
    margin: 10px 0;
}

/* КАРТОЧКИ */
.card {
    padding: 12px;
    border-radius: 10px;
    margin: 5px 0;
    color: white;
    font-weight: bold;
}

.yellow { background: #f59e0b; }
.green { background: #16a34a; }
.blue { background: #2563eb; }
.dark { background: #374151; }

/* КНОПКА */
.btn {
    display: block;
    background: red;
    color: white;
    text-align: center;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
    text-decoration: none;
}

/* БЛОК */
.block {
    background: white;
    padding: 20px;
    border-radius: 16px;
    margin-top: 20px;
}

/* ФОРМА */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 15px;
    background: red;
    color: white;
    border: none;
}

/* POPUP */
.popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
}

.popup-content {
    background:white;
    padding:20px;
    border-radius:16px;
    width:90%;
    max-width:400px;
}

.close {
    float:right;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
Работа на складе / заводе
</div>

<div class="container">

<div class="hero fade">
<h1>Работа с доходом</h1>

<div class="salary" id="salary">0 ₽</div>

<p>Без опыта • Быстрое оформление</p>

<div class="card yellow">💰 Высокий доход</div>
<div class="card green">✅ Официально</div>
<div class="card blue">🤝 Контракт</div>
<div class="card dark">🚚 Есть водитель</div>

<a href="#form" class="btn">ПОДОБРАТЬ ВАКАНСИЮ</a>
</div>

<div class="block fade">
<h2>О работе</h2>
<p>Работа не сложная. Всему обучают на месте.</p>
<p>Подходит без опыта.</p>
</div>

<div class="block fade">
<h2 id="form">Оставить заявку</h2>

<input type="text" placeholder="Имя">
<input type="tel" placeholder="Телефон">

<select>
<option>Выберите мессенджер</option>
<option>WhatsApp</option>
<option>Telegram</option>
<option>MAX</option>
</select>

<button onclick="sendForm()">Отправить</button>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<span class="close" onclick="closePopup()">✖</span>
<h3>Подберём вам работу</h3>

<input type="text" id="pname" placeholder="Имя">
<input type="tel" id="pphone" placeholder="Телефон">

<button onclick="sendPopup()">Отправить</button>
</div>
</div>

<script>
// TELEGRAM
function sendForm() {
let name = document.querySelector('input[type="text"]').value;
let phone = document.querySelector('input[type="tel"]').value;
sendToTG(name, phone);
}

function sendPopup() {
let name = document.getElementById('pname').value;
let phone = document.getElementById('pphone').value;
sendToTG(name, phone);
closePopup();
}

function sendToTG(name, phone) {
let token = "8724372615:AAEjCiuGB2gIHDqB0lPEiGJIt3ZxhEBNZc8";
let chat_id = "8183270307";

let text = "Новая заявка:%0AИмя: " + name + "%0AТелефон: " + phone;

let url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + text;

fetch(url)
.then(() => alert("Заявка отправлена"))
.catch(() => alert("Ошибка"));
}

// POPUP
function closePopup() {
document.getElementById('popup').style.display = "none";
}

setTimeout(() => {
document.getElementById('popup').style.display = "flex";
}, 2000);

// АНИМАЦИЯ СКРОЛЛА
const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (entry.isIntersecting) {
entry.target.classList.add('show');
}
});
});

document.querySelectorAll('.fade').forEach(el => {
observer.observe(el);
});

// АНИМАЦИЯ ЦИФР
let started = false;

function animateSalary() {
if (started) return;
started = true;

let el = document.getElementById("salary");
let start = 0;
let end = 300000;
let duration = 2000;
let stepTime = 20;
let increment = end / (duration / stepTime);

let counter = setInterval(() => {
start += increment;
if (start >= end) {
start = end;
clearInterval(counter);
}
el.innerText = Math.floor(start).toLocaleString() + " ₽";
}, stepTime);
}

// запуск при появлении блока
const salaryObserver = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (entry.isIntersecting) {
animateSalary();
}
});
});

salaryObserver.observe(document.getElementById("salary"));
</script>

</body>
</html>
