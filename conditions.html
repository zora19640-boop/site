<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Условия</title>

<style>
body{margin:0;font-family:Arial;background:#eef1f5;}
.container{max-width:500px;margin:auto;padding:20px;}

.block{
background:white;
padding:20px;
border-radius:20px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.fade{opacity:0;transform:translateY(30px);transition:0.8s;}
.fade.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<div class="container">

<div class="block fade">
<h2>🏠 Проживание</h2>
<p>Предоставляется бесплатно</p>
</div>

<div class="block fade">
<h2>🍽 Питание</h2>
<p>Есть варианты с питанием</p>
</div>

<div class="block fade">
<h2>📄 Оформление</h2>
<p>Официальный контракт</p>
</div>

</div>

<script>
const o=new IntersectionObserver(e=>{e.forEach(i=>{if(i.isIntersecting)i.target.classList.add('show');});});
document.querySelectorAll('.fade').forEach(el=>o.observe(el));
</script>

</body>
</html>
